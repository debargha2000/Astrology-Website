runConfig:
  cpu: 1
  memoryMiB: 512
  minInstances: 0
  maxInstances: 10
  concurrency: 80

env:
  - variable: NODE_ENV
    value: production
    availability:
      - BUILD
      - RUNTIME
  - variable: JWT_SECRET
    secret: JWT_SECRET
    availability:
      - RUNTIME
  - variable: COOKIE_SECRET
    secret: COOKIE_SECRET
    availability:
      - RUNTIME
  - variable: RAZORPAY_KEY_ID
    secret: RAZORPAY_KEY_ID
    availability:
      - RUNTIME
  - variable: RAZORPAY_KEY_SECRET
    secret: RAZORPAY_KEY_SECRET
    availability:
      - RUNTIME
  - variable: RAZORPAY_WEBHOOK_SECRET
    secret: RAZORPAY_WEBHOOK_SECRET
    availability:
      - RUNTIME
